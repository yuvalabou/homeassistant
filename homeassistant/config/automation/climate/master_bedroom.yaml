---

- alias: "Master Bedroom: Climate & Fan Manager"
  id: 80687afd-c9ef-47b1-80ff-4de14b38ba4d
  mode: restart
  trigger:
    - { id: 'morning_heat', trigger: time, at: '06:10:00' }
    - { id: 'shabbat_wake', trigger: time, at: '08:00:00' }
    - { id: 'night_sleep_prep', trigger: time, at: '22:30:00' }
    - { id: 'shabbat_nap', trigger: time, at: '12:30:00' }
    - { id: 'shabbat_night_fan', trigger: time, at: '19:30:00' }
    - { id: 'shabbat_night_ac', trigger: time, at: '21:00:00' }
    - { id: 'stop_morning', trigger: time, at: '09:00:00' }
    - { id: 'stop_afternoon', trigger: time, at: '16:30:00' }
  condition:
    - condition: state
      entity_id: group.person
      state: 'home'
    - condition: template
      value_template: >
        {% set shabbat = is_state('binary_sensor.jewish_calendar_issur_melacha_in_effect', 'on') %}
        {% set tid = trigger.id if trigger is defined else 'manual' %}
        {% if tid == 'morning_heat' %} {{ not shabbat }}
        {% elif tid == 'shabbat_wake' %} {{ shabbat }}
        {% elif tid == 'night_sleep_prep' %} {{ not shabbat }}
        {% elif tid in ['shabbat_nap', 'shabbat_night_ac', 'shabbat_night_fan', 'stop_morning', 'stop_afternoon'] %} {{ shabbat }}
        {% else %} false {% endif %}
  action:
    - choose:
        - conditions:
            - condition: trigger
              id: ['night_sleep_prep', 'shabbat_nap', 'shabbat_night_ac']
          sequence:
            - &fan_66
              action: fan.turn_on
              target:
                entity_id: fan.master_bedroom_fan
              data:
                percentage: 66
            - choose:
                - conditions: &is_winter
                    - condition: template
                      value_template: "{{ now().month >= 11 or now().month <= 3 }}"
                  sequence:
                    - action: climate.set_temperature
                      target: &ac_master
                        entity_id: climate.master_bedroom_ac
                      data:
                        hvac_mode: cool
                        temperature: 19
              default:
                - action: climate.set_temperature
                  target: *ac_master
                  data:
                    hvac_mode: cool
                    temperature: 21
                - action: climate.set_fan_mode
                  target: *ac_master
                  data:
                    fan_mode: 'low'
                - &quiet_on
                  action: switch.turn_on
                  target:
                    entity_id: switch.master_bedroom_ac_quiet
        - conditions:
            - condition: trigger
              id: ['morning_heat', 'shabbat_wake']
          sequence:
            - *fan_66
            - choose:
                - conditions: *is_winter
                  sequence:
                    - action: climate.set_temperature
                      target: *ac_master
                      data:
                        temperature: 22
                        hvac_mode: heat
              default:
                - action: climate.set_temperature
                  target: *ac_master
                  data:
                    temperature: 24
                    hvac_mode: cool
                - action: climate.set_fan_mode
                  target: *ac_master
                  data:
                    fan_mode: 'medium'
                - delay: "00:00:02"
                - *quiet_on
        - conditions:
            - condition: trigger
              id: 'shabbat_night_fan'
          sequence:
            - *fan_66
        - conditions:
            - condition: trigger
              id: ['stop_morning', 'stop_afternoon']
          sequence:
            - action: climate.turn_off
              target: *ac_master
            - action: fan.turn_off
              target:
                entity_id: fan.master_bedroom_fan
            - action: switch.turn_off
              target:
                entity_id: switch.master_bedroom_ac_quiet
