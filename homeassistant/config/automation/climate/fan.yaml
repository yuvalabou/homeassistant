---

- alias: "Kids Bedroom: Fan Manager"
  id: 15136e60-264f-43f2-974f-641b5ce2cf45
  mode: restart
  trigger:
    - { id: 'turn_on', trigger: time, at: '19:00:00' }
    - { id: 'turn_off', trigger: time, at: '07:00:00' }
    - { id: 'shabbat_on', trigger: time, at: '12:30:00' }
    - { id: 'shabbat_off', trigger: time, at: '16:00:00' }
  condition:
    - condition: state
      entity_id: group.person
      state: 'home'
    - condition: template
      value_template: >
        {% set shabbat = is_state('binary_sensor.jewish_calendar_issur_melacha_in_effect', 'on') %}
        {{ trigger.id in ['turn_on', 'turn_off'] or (shabbat and trigger.id in ['shabbat_on', 'shabbat_off']) }}
  action:
    - choose:
        - conditions: "{{ trigger.id in ['turn_on', 'shabbat_on'] }}"
          sequence:
            - action: fan.turn_on
              target:
                entity_id: fan.kids_bedroom_fan
              data:
                percentage: >
                  {% set temp = states('sensor.kids_room_temperature') | float(22) %}
                  {% if temp >= 26 %} 100
                  {% elif temp >= 24 %} 66
                  {% elif temp >= 22 %} 33
                  {% else %} 33 {% endif %}
        - conditions: "{{ trigger.id in ['turn_off', 'shabbat_off'] }}"
          sequence:
            - action: fan.turn_off
              target:
                entity_id: fan.kids_bedroom_fan
